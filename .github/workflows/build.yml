name: Build and Release Latest

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: TextRepeater.exe
          - os: macos-latest
            asset_name: TextRepeater-macOS.zip

    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        
    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconsole --onefile --windowed --name "TextRepeater" main.py

    - name: Build and Zip (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconsole --windowed --name "TextRepeater" main.py
        cd dist
        zip -r TextRepeater-macOS.zip TextRepeater.app
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: |
          dist/TextRepeater.exe
          dist/TextRepeater-macOS.zip
        if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          
      - name: Update 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "🔥 Latest Auto-Build"
          body: "This release automatically compiles and updates every single time you push new code!"
          prerelease: true
          files: artifacts/*
